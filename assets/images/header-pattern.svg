<svg xmlns="http://www.w3.org/2000/svg" width="320" height="160" viewBox="0 0 320 160">
  <g stroke="#D8A14A" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.28">

    <!-- TOP ROW — staggered heights, left-to-right -->

    <!-- Fork (22, 38) -->
    <g transform="translate(22,38)">
      <line x1="-4" y1="-18" x2="-4" y2="-8"/>
      <line x1="0" y1="-18" x2="0" y2="-8"/>
      <line x1="4" y1="-18" x2="4" y2="-8"/>
      <path d="M-4,-8 Q0,-3 4,-8"/>
      <line x1="0" y1="-3" x2="0" y2="18"/>
    </g>

    <!-- Coffee cup (90, 24) -->
    <g transform="translate(90,24)">
      <path d="M-11,-1 L-11,-13 Q-11,-17 -7,-17 L7,-17 Q11,-17 11,-13 L11,-1 Q11,3 0,3 Q-11,3 -11,-1 Z"/>
      <path d="M11,-9 Q16,-9 16,-5 Q16,-1 11,-1"/>
      <path d="M-12,5 Q0,9 12,5"/>
      <path d="M-2,-19 Q0,-23 -2,-27"/>
      <path d="M3,-19 Q5,-23 3,-27"/>
    </g>

    <!-- Wheat (162, 52) -->
    <g transform="translate(162,52)">
      <line x1="0" y1="-28" x2="0" y2="22"/>
      <path d="M0,-20 C-9,-25 -12,-16 -2,-14"/>
      <path d="M0,-11 C9,-16 12,-7 2,-5"/>
      <path d="M0,-2 C-9,-7 -12,2 -2,4"/>
      <path d="M0,7 C9,2 12,11 2,13"/>
    </g>

    <!-- Star (232, 30) -->
    <g transform="translate(232,30)">
      <line x1="-7" y1="0" x2="7" y2="0"/>
      <line x1="0" y1="-7" x2="0" y2="7"/>
      <line x1="-5" y1="-5" x2="5" y2="5"/>
      <line x1="5" y1="-5" x2="-5" y2="5"/>
    </g>

    <!-- Spoon (290, 44) rotate(-18) -->
    <g transform="translate(290,44) rotate(-18)">
      <ellipse cx="0" cy="-15" rx="6" ry="8"/>
      <line x1="0" y1="-7" x2="0" y2="17"/>
    </g>

    <!-- BOTTOM ROW — offset ~half-tile right, different icons -->

    <!-- Herb/leaf (52, 124) -->
    <g transform="translate(52,124)">
      <path d="M0,13 C-10,-2 -10,-19 0,-23 C10,-19 10,-2 0,13 Z"/>
      <line x1="0" y1="13" x2="0" y2="-23"/>
      <path d="M0,-8 L-5,-13"/>
      <path d="M0,-8 L5,-13"/>
    </g>

    <!-- Star (122, 110) -->
    <g transform="translate(122,110)">
      <line x1="-7" y1="0" x2="7" y2="0"/>
      <line x1="0" y1="-7" x2="0" y2="7"/>
      <line x1="-5" y1="-5" x2="5" y2="5"/>
      <line x1="5" y1="-5" x2="-5" y2="5"/>
    </g>

    <!-- Pot (196, 134) -->
    <g transform="translate(196,134)">
      <path d="M-8,9 L-10,-2 Q-10,-8 0,-8 Q10,-8 10,-2 L8,9 Q8,12 0,12 Q-8,12 -8,9 Z"/>
      <path d="M-7,-8 Q-7,-13 0,-13 Q7,-13 7,-8"/>
      <circle cx="0" cy="-14" r="2" fill="#D8A14A" opacity="0.28" stroke="none"/>
      <path d="M-10,-1 Q-13,-1 -13,3 Q-13,6 -10,6"/>
      <path d="M10,-1 Q13,-1 13,3 Q13,6 10,6"/>
    </g>

    <!-- Fork (260, 118) rotate(12) -->
    <g transform="translate(260,118) rotate(12)">
      <line x1="-4" y1="-18" x2="-4" y2="-8"/>
      <line x1="0" y1="-18" x2="0" y2="-8"/>
      <line x1="4" y1="-18" x2="4" y2="-8"/>
      <path d="M-4,-8 Q0,-3 4,-8"/>
      <line x1="0" y1="-3" x2="0" y2="18"/>
    </g>

    <!-- Wheat (308, 128) -->
    <g transform="translate(308,128)">
      <line x1="0" y1="-26" x2="0" y2="22"/>
      <path d="M0,-18 C-9,-23 -11,-14 -2,-12"/>
      <path d="M0,-9 C9,-14 11,-5 2,-3"/>
      <path d="M0,0 C-9,-5 -11,4 -2,6"/>
      <path d="M0,9 C9,4 11,13 2,15"/>
    </g>

  </g>
</svg>
